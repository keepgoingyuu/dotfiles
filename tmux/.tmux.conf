set-option -g default-shell /usr/bin/zsh
set-option -g history-limit 10000
# 告訴 tmux 預設就用 screen-256color
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
# Ghostty 專用設定
set -ga terminal-overrides ",ghostty:Tc:sitm=\E[3m:ritm=\E[23m:smxx=\E[9m:rmxx=\E[29m"
# 修復 Ghostty 狀態列重繪問題
set -ga terminal-overrides ",ghostty:smcup@:rmcup@"

set -g prefix C-a
unbind C-b

bind-key C-a send-prefix

unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.tmux.conf \; display "Tmux config reloaded!"

# Reload bashrc in all panes (Prefix + R) - Silent version
bind R run-shell 'tmux list-panes -a -F "#{session_name}:#{window_index}.#{pane_index}" | xargs -I {} tmux send-keys -t {} C-u "source ~/.bashrc 2>/dev/null" Enter' \; display "All panes reloaded with latest bashrc!"

# Reload bashrc only in current session (Prefix + B)
bind B run-shell 'tmux list-panes -t "#{session_name}" -F "#{session_name}:#{window_index}.#{pane_index}" | xargs -I {} tmux send-keys -t {} C-u "source ~/.bashrc" Enter' \; display "Current session reloaded!"

# Sesh session picker (Prefix + S)
bind S display-popup -E -w 40% -h 50% 'sesh connect "$(sesh list | fzf)"'

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z

set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection 
bind-key -T copy-mode-vi 'y' send -X copy-selection

# 啟用剪貼簿支援 (支援 SSH)
set -g set-clipboard on

# 支援 iTerm2 的 OSC 52 剪貼簿
set-option -g set-clipboard external

# 啟用滑鼠選取後自動複製到系統剪貼簿
# 使用 pbcopy (macOS) 或 OSC 52 序列
if-shell "uname | grep -q Darwin" \
  'bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "printf '\''\\033]52;c;%s\\a'\'' \"\$(base64 | tr -d '\'\\n\'')\""'

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# List of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'  # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum'   # automatically saves sessions for you every 15 minutes
# set -g @plugin 'jimeh/tmux-themepack'          # 提供多種主題 (replaced with Catppuccin)
set -g @plugin 'catppuccin/tmux'               # Catppuccin theme
# set -g @plugin 'erikw/tmux-powerline'          # orange 怕會失敗
set -g @plugin 'omerxx/tmux-floax'             # 浮動視窗插件

# tmux-floax 設定 (預設快捷鍵是 C-a P)
set -g @floax-bind 'p'                         # 設定快捷鍵為 prefix + p

# tmux-resurrect 設定
set -g @resurrect-capture-pane-contents 'on'   # 保存 pane 內容

# tmux-continuum 設定
set -g @continuum-restore 'on'                 # 自動恢復 sessions
set -g @continuum-save-interval '15'           # 每 15 分鐘自動儲存一次

# Catppuccin theme settings
set -g @catppuccin_flavor 'mocha'               # mocha, macchiato, frappe, or latte

# Catppuccin status bar - simplified
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " "
set -g @catppuccin_window_number_position "left"

# Simplify window display
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"

# Minimal status bar - only show session and time
set -g @catppuccin_status_modules_right "session"
set -g @catppuccin_status_modules_left ""
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "none"
set -g @catppuccin_status_connect_separator "no"

# Custom minimal display
set -g @catppuccin_session_text "#(cat /tmp/tmux_city 2>/dev/null || echo '...')"

# 只在最外層 session 顯示 status bar
set -g status on

# 如果已經在 tmux（nested session），就關掉內層的 status bar
# if-shell '[ -n "$TMUX" ]' 'set -g status off'

# 修復 Ghostty 終端的狀態列重疊問題
# 限制狀態列寬度避免 Ghostty 渲染問題
set -g status-left-length 20
set -g status-right-length 100

# 偵測到本地視窗大小改變時，自動調整 pane／window
set -g aggressive-resize off

# 關閉自動改名，避免 TERM 被覆寫
set -g allow-rename off

# 避免重繪延遲
set -s escape-time 0

# 狀態列位置 (可選 top 或 bottom)
set -g status-position bottom

# 簡化狀態列格式 - 覆蓋 Catppuccin 設定
set -g status-left "[#S] "  # 顯示 session 名稱
set -g status-left-length 30
set -g status-right "#H❤️#(cat /tmp/tmux_city 2>/dev/null || echo '...') %H:%M"
set -g status-right-length 100

# 調整重繪頻率
set -g status-interval 1

# Auto-update city location in background (every 10 min)
run-shell 'if ! pgrep -f tmux-update-city > /dev/null; then nohup ~/.tmux-update-city.sh &>/dev/null & fi'

# Initialize TMUX plugin manager （keep this Line at the very bottom of tmux.conf）
run '~/.tmux/plugins/tpm/tpm'

# 覆蓋 Catppuccin 主題的狀態列設定（必須放在 tpm 之後）
# 使用條件格式：當前綴鍵被按下時終端圖標背景變紅
set -g status-left "#{?client_prefix,#[bg=red]#[fg=black] \uf489 #[bg=default], \uf489 }#[fg=blue,bold][#S] #[fg=default]"
set -g status-right "#[fg=magenta]\uf07b #{b:pane_current_path} #[fg=yellow]#H #[fg=red]♥ #[fg=green]#(cat /tmp/tmux_city 2>/dev/null || echo '...') #[fg=cyan]%H:%M"



